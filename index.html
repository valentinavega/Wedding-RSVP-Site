<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Val &amp; Tom — Wedding RSVP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="layout">

  <!-- ─── LEFT: Info panel ──────────────────────────────────────── -->
  <aside class="info-panel">
    <div class="info-inner">
      <p class="hero-date">Saturday, October 10, 2026 | 3:00 PM</p>
      <h1 class="hero-names">Val &amp; Tom</h1>
      <p class="hero-location">4447 Cain Cir.<br>Tucker, GA 30084</p>
      <nav class="hero-nav">
        <a href="#rsvp" class="btn btn-primary">RSVP</a>
        <a href="#cancel" class="btn btn-ghost">Cancel RSVP</a>
      </nav>
    </div>
  </aside>

  <!-- ─── RIGHT: Forms ──────────────────────────────────────────── -->
  <main class="forms-panel">

    <!-- ─── RSVP FORM ─────────────────────────────────────────── -->
    <section id="rsvp" class="section">
      <div class="card">
        <h2>RSVP</h2>
        <p class="section-sub">Please respond by <strong>September 1, 2026</strong>.</p>

        <form id="rsvp-form" novalidate>
          <div class="field">
            <label for="rsvp-name">Full Name *</label>
            <input type="text" id="rsvp-name" placeholder="Jane Smith" required />
          </div>
          <div class="field">
            <label for="rsvp-email">Email Address *</label>
            <input type="email" id="rsvp-email" placeholder="jane@email.com" required />
          </div>
          <div class="field">
            <label>Are you bringing a +1?</label>
            <div class="radio-group">
              <label class="radio-label">
                <input type="radio" name="plus-one" id="rsvp-plusone-yes" value="yes" />
                <span class="radio-btn">Yes, bringing a +1</span>
              </label>
              <label class="radio-label">
                <input type="radio" name="plus-one" id="rsvp-plusone-no" value="no" />
                <span class="radio-btn">No, just me</span>
              </label>
            </div>
          </div>
          <div class="field">
            <label for="rsvp-dietary">Dietary Restrictions</label>
            <input type="text" id="rsvp-dietary" placeholder="Vegetarian, gluten-free, etc." />
          </div>
          <div class="field">
            <label for="rsvp-message">Message for the Couple</label>
            <textarea id="rsvp-message" rows="3" placeholder="Any well-wishes or notes…"></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-full" id="rsvp-submit">Send RSVP</button>
          <p class="form-status" id="rsvp-status"></p>
        </form>
      </div>
    </section>

    <!-- ─── CANCEL FORM ───────────────────────────────────────── -->
    <section id="cancel" class="section">
      <div class="card">
        <h2>Cancel Your RSVP</h2>
        <p class="section-sub">Plans changed? Enter the name and email you used when you RSVPed.</p>

        <form id="cancel-form" novalidate>
          <div class="field">
            <label for="cancel-name">Full Name *</label>
            <input type="text" id="cancel-name" placeholder="Jane Smith" required />
          </div>
          <div class="field">
            <label for="cancel-email">Email Address *</label>
            <input type="email" id="cancel-email" placeholder="jane@email.com" required />
          </div>

          <button type="submit" class="btn btn-outline btn-full" id="cancel-submit">Cancel RSVP</button>
          <p class="form-status" id="cancel-status"></p>
        </form>
      </div>
    </section>

    <footer class="footer">
      <p>Made by Val! · Questions? <a href="mailto:valvegadesign@gmail.com">valvegadesign@gmail.com</a></p>
    </footer>

  </main>

  </div><!-- /.layout -->

  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
